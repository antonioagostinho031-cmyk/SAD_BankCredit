services:
  # ─── Backend API (Web Service — Node.js) ───────────────────────────────────
  - type: web
    name: sad-bankcredit-api
    env: node
    region: frankfurt
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRATION
        value: 7d
      - key: STORAGE_BUCKET
        value: documents
      - key: MAX_FILE_SIZE
        value: 10485760
      - key: MIN_INCOME
        value: 50000
      - key: MAX_DEBT_RATIO
        value: 40
      - key: MIN_CREDIT_SCORE
        value: 50
      # ── Definir manualmente no dashboard Render ──
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  # ─── Frontend (Static Site — React/Vite) ───────────────────────────────────
  - type: web
    name: sad-bankcredit-web
    env: static
    region: frankfurt
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # ── Definir manualmente no dashboard Render antes do primeiro build ──
      - key: VITE_API_URL
        sync: false
